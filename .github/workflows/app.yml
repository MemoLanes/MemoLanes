name: App

on:
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - "tools/geo_rasterizer/**"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "tools/geo_rasterizer/**"
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/

    steps:
      # ======== START SETUP ========
      - uses: actions/checkout@v3

      # Detect whether geo_rasterizer / geo_data_format sources changed, so the
      # geo-only check/test steps run only when related files change. (The
      # rasterize step itself still runs every time — the app's rust tests
      # require the bins — but it's a near-instant no-op on a cache hit.)
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            geo:
              - 'tools/geo_rasterizer/**'
              - 'app/rust/geo_data_format/**'

      - uses: extractions/setup-just@v2

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: 3.44
          cache: true

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            app/rust/
            app/rust/geo_data_format/
            app/journey_kernel/
            tools/geo_rasterizer/

      - uses: cargo-bins/cargo-binstall@main

      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y --force --no-track "cargo-expand" && cargo binstall -y --force --no-track "flutter_rust_bridge_codegen@`just get-frb-version`"

      # ======== END SETUP ========

      - name: Get Rust Dependencies
        working-directory: app/rust
        run: cargo fetch

      - name: Get Rust Dependencies (geo_data_format)
        working-directory: app/rust/geo_data_format
        run: cargo fetch

      - name: Get Rust Dependencies (geo_rasterizer)
        working-directory: tools/geo_rasterizer
        run: cargo fetch

      - name: Rust Code Check
        working-directory: app
        run: just rust-check

      # Cache the pinned Natural Earth source (the pin/sha256 live in
      # geo_data_format/src/pov.rs; download.rs holds the fetch logic) so
      # rasterize-geo doesn't re-download it on every run.
      - name: Cache Natural Earth source
        uses: actions/cache@v4
        with:
          path: tools/geo_rasterizer/natural_earth/*.geojson
          key: geo-natural-earth-${{ hashFiles('tools/geo_rasterizer/src/download.rs', 'app/rust/geo_data_format/src/pov.rs') }}

      # Cache the generated geo_data_*.bin. The key hashes the rasterizer and
      # geo_data_format *sources* (not just the inputs) on purpose: the in-bin
      # provenance hash keys on inputs + GEO_DATA_VERSION, NOT on algorithm
      # code, so an algorithm change must bust this cache or stale output would
      # be served. On a hit, rasterize-geo finds matching provenance and skips.
      - name: Cache geo_data bins
        uses: actions/cache@v4
        with:
          path: |
            app/assets/geo_data_iso.bin
            app/assets/geo_data_chn.bin
            app/assets/geo_data_usa.bin
          key: geo-bins-${{ hashFiles('tools/geo_rasterizer/src/**', 'tools/geo_rasterizer/Cargo.lock', 'tools/geo_rasterizer/geo_entity_registry.toml', 'app/rust/geo_data_format/src/**', 'app/rust/geo_data_format/Cargo.lock') }}

      - name: Geo Data Format Check
        if: steps.changes.outputs.geo == 'true'
        working-directory: app
        run: just geo-data-format-check

      - name: Geo Rasterizer Check
        if: steps.changes.outputs.geo == 'true'
        working-directory: app
        run: just geo-rasterizer-check
      - name: Geo Tests
        if: steps.changes.outputs.geo == 'true'
        working-directory: app
        run: just test-geo
      - name: Geo Rasterize All POVs
        working-directory: app
        run: just rasterize-geo

      # Guardrail: rasterize-geo regenerates the committed id registry (union
      # over Pov::ALL). CI can't commit, so a non-empty diff means someone bumped
      # a POV/source but forgot to regenerate + commit geo_entity_registry.toml.
      - name: Geo Registry Up To Date
        run: git -C "$GITHUB_WORKSPACE" diff --exit-code -- tools/geo_rasterizer/geo_entity_registry.toml

      # ======== START WASM MODULE ========
      - name: Get Rust Dependencies (journey kernel)
        working-directory: app/journey_kernel
        run: cargo fetch
        
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'app/journey_kernel/yarn.lock'
          
      - name: Install Yarn dependencies
        working-directory: app/journey_kernel
        run: yarn install --frozen-lockfile

      - name: Install wasm-pack
        run: cargo binstall -y --force --no-track wasm-pack

      - name: Build the wasm package
        working-directory: app/journey_kernel
        run: | 
          wasm-pack build --target web --out-name journey_kernel --features wasm --no-default-features
        
      - name: Journey Kernel Check
        working-directory: app/journey_kernel
        run: just journey-kernel-check

      # ======== END WASM MODULE ========

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: FRB Codegen
        working-directory: app
        run: just frb-generate

      - name: Flutter Code Check
        working-directory: app
        run: just flutter-check
        
      - name: Flutter, Journey Kernel, and Rust Tests
        working-directory: app
        run: just test-app
